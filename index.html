<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mixamo FBX Controller</title>
  <style>
    html, body { margin:0; height:100%; overflow:hidden; background:#0b0f1a; }
    #ui {
      position: fixed; left: 12px; top: 12px; z-index: 10;
      color: #fff; font: 14px/1.35 system-ui, Arial;
      background: rgba(0,0,0,.45);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 12px;
      padding: 12px;
      width: 280px;
      user-select: none;
      backdrop-filter: blur(6px);
    }
    #title { font-weight: 700; font-size: 15px; margin-bottom: 6px; }
    #status { opacity:.9; margin-bottom: 10px; }
    #status b { font-weight: 700; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    button {
      cursor: pointer; border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.08); color: #fff;
      border-radius: 10px; padding: 8px 10px;
      font: 13px system-ui, Arial; text-align: left;
      transition: transform .08s ease, background .2s ease;
    }
    button:hover { background: rgba(255,255,255,.12); }
    button:active { transform: scale(.98); }
    button small { display:block; opacity:.75; margin-top: 2px; font-size: 11px; }
    .row { display:flex; gap:8px; margin-top:10px; }
    .pill {
      display:inline-block; padding:2px 8px; border-radius: 999px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.07);
      font-size: 12px;
    }
    #errors {
      position: fixed; right: 12px; top: 12px; z-index: 10;
      width: min(520px, calc(100vw - 24px));
      color: #ffd7d7; font: 12px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: rgba(90,0,0,.35);
      border: 1px solid rgba(255,120,120,.25);
      border-radius: 12px;
      padding: 10px 12px;
      display: none;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="title">Controles de animación</div>
    <div id="status">Cargando…</div>
    <div class="grid" id="buttons"></div>

    <div class="row" style="margin-top:12px;">
      <span class="pill">Mouse: orbitar/zoom</span>
      <span class="pill">Teclas: 1–9</span>
    </div>
  </div>

  <div id="errors"></div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
      }
    }
  </script>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
