<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <title>Shadow Arena | Juego 3D</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="./assets/img/favicon.png" />

  <!-- CSS -->
  <link rel="stylesheet" href="./styles.css" />

  <!-- Importmap Three.js -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.179.1/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.179.1/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <!-- Overlay de carga / estado -->
  <div id="topbar">
    <div class="brand-block">
      <div class="brand-title">SHADOW ARENA</div>
      <div class="brand-subtitle">Combate 3D con Three.js</div>
    </div>

    <div id="status-panel">
      <div class="panel-title">Estado</div>
      <div id="status">
        Cargando juego...
      </div>
    </div>
  </div>

  <!-- Controles rápidos -->
  <div id="controls-panel">
    <div class="panel-title">Controles</div>
    <div class="controls-grid">
      <span><b>WASD</b> Mover</span>
      <span><b>Shift</b> Correr</span>
      <span><b>Espacio</b> Saltar</span>
      <span><b>1-6</b> Ataques</span>
      <span><b>F</b> Ataque rápido</span>
      <span><b>7</b> Bloquear</span>
      <span><b>V</b> Esquivar</span>
      <span><b>R</b> Lock-on</span>
      <span><b>Tab</b> Cambiar target</span>
      <span><b>P</b> Pausa</span>
      <span><b>T</b> Reiniciar</span>
      <span><b>Q / E</b> Zoom</span>
    </div>
  </div>

  <!-- Panel botones -->
  <div id="action-panel">
    <div class="panel-title">Acciones</div>
    <div id="buttons" class="buttons-grid"></div>
  </div>

  <!-- Panel de errores -->
  <div id="errors" class="error-box" style="display:none;"></div>

  <!-- Script principal -->
  <script type="module" src="./js/main.js"></script>
</body>
</html>
